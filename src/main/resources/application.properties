spring.application.name=interviewprep
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.profiles.active=${PROFILE}
thirdeye.resume.updater.api.key=${THIRDEYE_RESUME_UPDATER_API_KEY}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
thirdeye.timezone = Asia/Kolkata
thirdeye.send.resume = true

spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
thirdeye.redis.document.enabled=${DOCUMENT_CACHE}
thirdeye.redis.response.enabled=${RESPONSE_CACHE}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
spring.cloud.aws.region.static=ap-south-1
thirdeye.bucket.name=${AWS_BUCKET_NAME}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB 

thirdeye.root.name=Interview-perp
spring.jpa.open-in-view=false
spring.main.lazy-initialization=true
spring.jpa.hibernate.ddl-auto=validate
